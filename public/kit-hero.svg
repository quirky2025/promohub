<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 640" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1160" height="640" fill="#F8F7F4"/>
  <text x="580" y="56" text-anchor="middle" font-size="34" fill="#1B2A4A" font-weight="600">Build your promo kit</text>
  <text x="580" y="84" text-anchor="middle" font-size="15" fill="#7A7570" font-family="Arial, sans-serif" letter-spacing="2">YOUR BRAND ON EVERY PIECE — PICK YOUR OWN</text>

  <g fill="none" stroke="#1B2A4A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- helper: each YOUR BRAND tag drawn separately below -->

    <!-- 1. Drink bottle (cx190 cy250) -->
    <rect x="164" y="150" width="52" height="20" rx="4"/>
    <rect x="174" y="170" width="32" height="14"/>
    <rect x="146" y="184" width="88" height="150" rx="24"/>

    <!-- 2. Tote bag (cx570 cy250) -->
    <path d="M518 214 h104 l12 120 h-128 z"/>
    <path d="M540 214 q0 -42 30 -42 q30 0 30 42"/>
    <path d="M540 214 q0 -28 30 -28 q30 0 30 28" opacity="0"/>

    <!-- 3. T-shirt (cx950 cy250) -->
    <path d="M912 196 l-34 22 l16 26 l18 -12 v98 h76 v-98 l18 12 l16 -26 l-34 -22 q-20 18 -40 18 q-20 0 -40 -18 z"/>

    <!-- 4. Notebook (cx190 cy470) -->
    <rect x="158" y="392" width="92" height="150" rx="6"/>
    <line x1="178" y1="392" x2="178" y2="542"/>
    <circle cx="168" cy="408" r="3"/><circle cx="168" cy="428" r="3"/><circle cx="168" cy="448" r="3"/><circle cx="168" cy="468" r="3"/><circle cx="168" cy="488" r="3"/><circle cx="168" cy="508" r="3"/><circle cx="168" cy="528" r="3"/>

    <!-- 5. Pen (cx570 cy470) diagonal -->
    <path d="M612 396 l18 18 l-150 150 l-22 4 l4 -22 z"/>
    <line x1="612" y1="396" x2="630" y2="414"/>
    <line x1="600" y1="408" x2="618" y2="426"/>
    <path d="M470 540 l4 16"/>

    <!-- 6. Cap (cx950 cy470) -->
    <path d="M888 470 q0 -56 62 -56 q62 0 62 56 z"/>
    <path d="M888 470 q-26 2 -34 16 q44 10 96 10 q52 0 96 -10 q-8 -14 -34 -16"/>
    <path d="M950 414 v40"/>
  </g>

  <!-- YOUR BRAND tags (gold) -->
  <g font-family="Arial, sans-serif" font-size="9" letter-spacing="1" font-weight="bold">
    <g><rect x="156" y="236" width="68" height="26" rx="5" fill="#fff" stroke="#C9A96E" stroke-width="1.5"/><text x="190" y="253" text-anchor="middle" fill="#B2925A">YOUR BRAND</text></g>
    <g><rect x="536" y="262" width="68" height="26" rx="5" fill="#fff" stroke="#C9A96E" stroke-width="1.5"/><text x="570" y="279" text-anchor="middle" fill="#B2925A">YOUR BRAND</text></g>
    <g><rect x="916" y="252" width="68" height="26" rx="5" fill="#fff" stroke="#C9A96E" stroke-width="1.5"/><text x="950" y="269" text-anchor="middle" fill="#B2925A">YOUR BRAND</text></g>
    <g><rect x="190" y="452" width="56" height="24" rx="5" fill="#fff" stroke="#C9A96E" stroke-width="1.5"/><text x="218" y="468" text-anchor="middle" fill="#B2925A">YOUR BRAND</text></g>
    <g transform="rotate(-45 540 500)"><rect x="506" y="488" width="68" height="24" rx="5" fill="#fff" stroke="#C9A96E" stroke-width="1.5"/><text x="540" y="504" text-anchor="middle" fill="#B2925A">YOUR BRAND</text></g>
    <g><rect x="916" y="436" width="68" height="24" rx="5" fill="#fff" stroke="#C9A96E" stroke-width="1.5"/><text x="950" y="452" text-anchor="middle" fill="#B2925A">YOUR BRAND</text></g>
  </g>

  <!-- labels -->
  <g font-family="Arial, sans-serif" font-size="13" fill="#1B2A4A" text-anchor="middle" font-weight="bold">
    <text x="190" y="360">Drink Bottle</text>
    <text x="570" y="360">Tote Bag</text>
    <text x="950" y="360">T-Shirt</text>
    <text x="190" y="568">Notebook</text>
    <text x="570" y="600">Pen</text>
    <text x="950" y="520">Cap</text>
  </g>
</svg>
